<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Skills Test</title>

    <link rel="stylesheet" type="text/css" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- BOOTSTRAP-CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <!-- BOOTSTRAP-JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
</head>
<body>
    <div class="container mt-5 ">
        <h1>Member Signup</h1>
        <h4>Student Details</h4>
        <form>
            <div class="mb-3">
                <label for="Fullname" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="Fullname" placeholder="Enter your full name">
            </div>
        </form>
        <h4>Ticket Selection</h4>
        <form>
            <div class="mb-3">
                <label for="Quantity" class="form-label">Quantity (PHP 250 each)</label>
                <input type="number" class="form-control" id="Quantity" value="0" min="0">
            </div>
        </form>

        <div class="container mt-5">
            <label for="Member ID" class="form-label">Member ID:---</label>
        <hr>
            <label for="Subtotal" class="form-label">Subtotal:</label>
            <input type="number" class="form-control" id="Subtotal" value="Subtotal" readonly> 
        <br>
            <label for="Admin Fee" class="form-label">Admin Fee:</label>
            <input type="number" class="form-control" id="Admin Fee" value="50.00" readonly>
        <br>
            <label for="Total" class="form-label">Total:</label>
            <input type="number" class="form-control" id="Total" value="Total" readonly>
        </div>

        <br>

        <center><button type="button" class="btn btn-primary mt-5" onclick ="seePayment()">Complete Registration</button></center>

        <br>
        
    
    </div>
    <script src="main.js"></script>
</body>
</html>
